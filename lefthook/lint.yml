pre-commit:
  commands:
    markdown-format:
      glob: "**/*.md"
      run: rumdl fmt --check -- {staged_files}
      fail_text: "rumdl found formatting issues"

    markdownlint:
      glob: "**/*.md"
      run: bash scripts/check-staged-markdown.sh && markdownlint-cli2 {staged_files}
      fail_text: "markdownlint found issues"
