name: Lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  MISE_ENV: ci

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: pretty-good-software-org/ci-shared/actions/setup/mise@3e43ae583558b430bce9ead386266daf6a99508c # v1
        with:
          mise-env: ci
      - run: mise run lint:default
      - run: mise run test:staged-markdown-hook
